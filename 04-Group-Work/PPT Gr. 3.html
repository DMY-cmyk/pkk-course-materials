<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASB Conceptual Framework — Presentasi Interaktif</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
// no external chart library needed - charts use CSS

const qualCharRadarData = [
  { char: 'Relevansi', value: 95 }, { char: 'Rep. Tepat', value: 90 },
  { char: 'Keterbandingan', value: 80 }, { char: 'Keterverifikasian', value: 75 },
  { char: 'Ketepatan Waktu', value: 70 }, { char: 'Keterpahaman', value: 85 },
];
const elementsData = [
  { name: 'Aset', value: 30, color: '#1e3a8a' },
  { name: 'Liabilitas', value: 20, color: '#0d9488' },
  { name: 'Ekuitas', value: 15, color: '#d97706' },
  { name: 'Pendapatan', value: 15, color: '#059669' },
  { name: 'Beban', value: 12, color: '#dc2626' },
  { name: 'Lainnya', value: 8, color: '#7c3aed' },
];
const measurementData = [
  { basis: 'Historical Cost', relevance: 60, reliability: 95 },
  { basis: 'Fair Value', relevance: 95, reliability: 65 },
  { basis: 'Net Realizable', relevance: 80, reliability: 75 },
  { basis: 'Present Value', relevance: 90, reliability: 60 },
  { basis: 'Current Cost', relevance: 75, reliability: 70 },
];
const groupMembers = [
  { name: 'Ahmad Rizki Pratama', nim: '22010001' },
  { name: 'Bella Putri Santoso', nim: '22010014' },
  { name: 'Cahya Nur Hidayat', nim: '22010027' },
  { name: 'Dinda Ayu Rahayu', nim: '22010039' },
  { name: 'Eko Fajar Wijaya', nim: '22010052' },
  { name: 'Fira Amelia Natasya', nim: '22010065' },
];
const NAV = 'from-[#0f2557] via-[#1a3a8a] to-[#1e40af]';
const SLATE = 'from-slate-50 to-blue-50';
const TOTAL_SLIDES = 30;

const Card = ({ className = '', children }) => (
  <div className={'rounded-xl border border-gray-200 bg-white ' + className}>{children}</div>
);
const Badge = ({ children, color = 'bg-[#1a3a8a]' }) => (
  <span className={color + ' text-white text-sm px-3 py-1 rounded-full'}>{children}</span>
);
const SlideHeader = ({ icon, title, subtitle }) => (
  <div className="flex items-center gap-3 mb-6 border-b-2 border-[#1a3a8a]/20 pb-4">
    {icon && <span className="text-4xl flex-shrink-0">{icon}</span>}
    <div>
      <h2 className="text-4xl text-[#1a3a8a]">{title}</h2>
      {subtitle && <p className="text-lg text-gray-500 mt-0.5">{subtitle}</p>}
    </div>
  </div>
);
const getSectionLabel = (i) => {
  if (i===0) return 'Cover'; if (i===1) return 'Agenda';
  if (i>=2&&i<=4) return 'FASB'; if (i>=5&&i<=8) return 'Framework';
  if (i>=9&&i<=11) return 'Tujuan'; if (i>=12&&i<=16) return 'Kualitas';
  if (i>=17&&i<=20) return 'Elemen'; if (i>=21&&i<=24) return 'Pengukuran';
  if (i>=25&&i<=26) return 'Penyajian'; if (i>=27&&i<=28) return 'Global';
  return 'Kesimpulan';
};

function Presentation() {
  const [cur, setCur] = useState(0);
  const next = () => { if (cur < TOTAL_SLIDES-1) setCur(s => s+1); };
  const prev = () => { if (cur > 0) setCur(s => s-1); };
  useEffect(() => {
    const h = (e) => {
      if (e.key==='ArrowRight'||e.key==='ArrowDown') next();
      if (e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [cur]);
  const slide = () => { switch(cur) {

  case 0: return (
    <div className={"flex flex-col items-center justify-center h-full bg-gradient-to-br " + NAV + " text-white p-12 relative overflow-hidden"}>
      <div className="absolute top-0 right-0 w-96 h-96 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2"/>
      <div className="absolute bottom-0 left-0 w-64 h-64 bg-white/5 rounded-full translate-y-1/2 -translate-x-1/2"/>
      <div className="relative z-10 text-center max-w-5xl">
        <div className="flex items-center justify-center gap-3 mb-4">
          <div className="h-px w-16 bg-amber-400"/>
          <Badge color="bg-amber-500">Pelaporan Keuangan Korporat</Badge>
          <div className="h-px w-16 bg-amber-400"/>
        </div>
        <h1 className="text-6xl mb-3 leading-tight"><span className="text-amber-400">FASB</span> Conceptual Framework</h1>
        <p className="text-2xl opacity-80 mb-2">Kerangka Konseptual Pelaporan Keuangan</p>
        <div className="h-px w-32 bg-amber-400 mx-auto my-6"/>
        <div className="grid grid-cols-3 gap-3 mt-6 max-w-3xl mx-auto">
          {groupMembers.map((m,i) => (
            <div key={m.nim} className="bg-white/10 rounded-lg px-4 py-2 text-left">
              <p className="text-amber-300 text-sm">Anggota {i+1}</p>
              <p className="text-white font-medium text-sm">{m.name}</p>
              <p className="text-white/60 text-xs">{m.nim}</p>
            </div>
          ))}
        </div>
        <div className="mt-6 flex items-center justify-center gap-8 text-white/70 text-sm">
          <span>📅 April 2026</span><span>⏱ 30 Menit Presentasi</span><span>📊 30 Slide</span>
        </div>
      </div>
    </div>
  );

  case 1: return (
    <div className={"h-full p-12 bg-gradient-to-br " + SLATE}>
      <SlideHeader icon="🗂️" title="Agenda Presentasi" subtitle="Struktur materi selama 30 menit"/>
      <div className="grid grid-cols-2 gap-5 mt-4">
        {[
          {no:'01',topic:'Pengantar FASB',sub:'Sejarah, mandat, dan peran FASB',time:'~3 mnt',color:'border-blue-600 bg-blue-50'},
          {no:'02',topic:'Conceptual Framework',sub:'Definisi, tujuan, dan struktur SFAC',time:'~4 mnt',color:'border-indigo-600 bg-indigo-50'},
          {no:'03',topic:'Tujuan Pelaporan Keuangan',sub:'Pengguna utama & informasi berguna',time:'~4 mnt',color:'border-teal-600 bg-teal-50'},
          {no:'04',topic:'Karakteristik Kualitatif',sub:'Fundamental & Peningkat',time:'~5 mnt',color:'border-purple-600 bg-purple-50'},
          {no:'05',topic:'Elemen Laporan Keuangan',sub:'Aset, Liabilitas, Ekuitas, dll.',time:'~5 mnt',color:'border-amber-600 bg-amber-50'},
          {no:'06',topic:'Pengakuan & Pengukuran',sub:'Kriteria, dasar pengukuran, modal',time:'~5 mnt',color:'border-rose-600 bg-rose-50'},
          {no:'07',topic:'Penyajian & Pengungkapan',sub:'Prinsip penyajian informasi',time:'~2 mnt',color:'border-green-600 bg-green-50'},
          {no:'08',topic:'Isu Global & Kesimpulan',sub:'FASB-IASB, tantangan, penutup',time:'~2 mnt',color:'border-gray-600 bg-gray-50'},
        ].map(a => (
          <div key={a.no} className={"flex items-start gap-4 p-4 rounded-xl border-l-4 " + a.color}>
            <span className="text-3xl font-mono text-gray-300">{a.no}</span>
            <div className="flex-1"><p className="text-lg text-gray-800">{a.topic}</p><p className="text-sm text-gray-500">{a.sub}</p></div>
            <span className="text-xs bg-white border border-gray-200 text-gray-500 px-2 py-1 rounded-full whitespace-nowrap">{a.time}</span>
          </div>
        ))}
      </div>
    </div>
  );

  case 2: return (
    <div className="h-full p-12 bg-white">
      <SlideHeader icon="🏢" title="Apa itu FASB?" subtitle="Financial Accounting Standards Board"/>
      <div className="grid grid-cols-2 gap-8 mt-2">
        <div className="space-y-4">
          <div className="bg-[#0f2557] text-white p-5 rounded-xl">
            <h3 className="text-xl mb-2 text-amber-400">Definisi</h3>
            <p className="text-white/90 leading-relaxed">FASB adalah badan swasta independen yang bertanggung jawab menetapkan standar akuntansi dan pelaporan keuangan di Amerika Serikat (GAAP).</p>
          </div>
          <div className="grid grid-cols-2 gap-3">
            {[{label:'Didirikan',value:'1973'},{label:'Lokasi',value:'Norwalk, CT'},{label:'Status',value:'Independen'},{label:'Diakui SEC',value:'1973'}].map(item => (
              <div key={item.label} className="bg-blue-50 border border-blue-100 rounded-lg p-3 text-center">
                <p className="text-2xl text-[#1a3a8a]">{item.value}</p>
                <p className="text-xs text-gray-500 mt-1">{item.label}</p>
              </div>
            ))}
          </div>
          <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl">
            <p className="text-amber-800 text-sm leading-relaxed">FASB beroperasi di bawah pengawasan <strong>Financial Accounting Foundation (FAF)</strong> dan diakui oleh <strong>Securities and Exchange Commission (SEC)</strong> sebagai penyusun standar untuk perusahaan publik.</p>
          </div>
        </div>
        <div className="space-y-4">
          <h3 className="text-xl text-gray-700 mb-2">Fungsi Utama FASB</h3>
          {[
            {icon:'📐',title:'Menetapkan Standar',desc:'Membuat dan memperbarui Generally Accepted Accounting Principles (GAAP)'},
            {icon:'🔍',title:'Riset & Konsultasi',desc:'Melakukan riset mendalam dan konsultasi publik sebelum menerbitkan standar baru'},
            {icon:'🤝',title:'Konvergensi Global',desc:'Berkolaborasi dengan IASB untuk mencapai harmonisasi standar akuntansi global'},
            {icon:'📢',title:'Edukasi Publik',desc:'Memberikan panduan implementasi dan edukasi kepada para pemangku kepentingan'},
          ].map(f => (
            <div key={f.title} className="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
              <span className="text-2xl">{f.icon}</span>
              <div><p className="text-gray-800">{f.title}</p><p className="text-sm text-gray-500">{f.desc}</p></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  case 3: return (
    <div className={"h-full p-12 bg-gradient-to-br " + SLATE}>
      <SlideHeader icon="🕐" title="Sejarah FASB" subtitle="Evolusi standar akuntansi AS"/>
      <div className="relative mt-2">
        <div className="absolute left-12 top-0 bottom-0 w-0.5 bg-[#1a3a8a]/20"/>
        <div className="space-y-4">
          {[
            {year:'1934',event:'SEC dibentuk',desc:'Kongres AS mendelegasikan penetapan standar akuntansi kepada SEC',color:'bg-gray-100 border-gray-300'},
            {year:'1939',event:'CAP Dibentuk',desc:'Committee on Accounting Procedure (CAP) — badan standar akuntansi pertama AS',color:'bg-blue-50 border-blue-200'},
            {year:'1959',event:'APB Didirikan',desc:'Accounting Principles Board menggantikan CAP, menerbitkan APB Opinions',color:'bg-indigo-50 border-indigo-200'},
            {year:'1973',event:'FASB Didirikan',desc:'Menggantikan APB; diakui oleh SEC sebagai otoritas standar akuntansi AS',color:'bg-blue-100 border-[#1a3a8a]'},
            {year:'2002',event:'Norwalk Agreement',desc:'Perjanjian konvergensi FASB-IASB untuk menyatukan GAAP dan IFRS',color:'bg-amber-50 border-amber-300'},
            {year:'2010',event:'SFAC No. 8',desc:'FASB menerbitkan Conceptual Framework terbaru (Chapter 1 & 3)',color:'bg-teal-50 border-teal-300'},
          ].map(item => (
            <div key={item.year} className="flex items-start gap-6 pl-6">
              <div className="relative z-10 flex-shrink-0">
                <div className="w-12 h-12 rounded-full bg-[#1a3a8a] text-white flex items-center justify-center text-xs text-center leading-tight p-1">{item.year}</div>
              </div>
              <div className={"flex-1 border rounded-xl p-4 " + item.color}>
                <p className="text-gray-800">{item.event}</p>
                <p className="text-sm text-gray-600 mt-0.5">{item.desc}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  case 4: return (
    <div className="h-full p-12 bg-white">
      <SlideHeader icon="🎯" title="Mandat & Misi FASB" subtitle="Landasan operasional FASB"/>
      <div className="grid grid-cols-3 gap-6 mt-4">
        <div className="col-span-3 bg-gradient-to-r from-[#0f2557] to-[#1a3a8a] text-white p-6 rounded-2xl text-center">
          <p className="text-lg opacity-80 mb-2">Pernyataan Misi FASB</p>
          <p className="text-xl leading-relaxed italic">"Menetapkan dan meningkatkan standar akuntansi dan pelaporan keuangan untuk memberikan informasi yang berguna kepada investor dan pengguna lainnya dari laporan keuangan."</p>
        </div>
        {[
          {title:'Independensi',icon:'⚖️',color:'bg-blue-50 border-blue-200',points:['Bebas dari tekanan politik','Tidak berpihak pada industri tertentu','Proses due process terbuka']},
          {title:'Transparansi',icon:'🔎',color:'bg-teal-50 border-teal-200',points:['Konsultasi publik terbuka','Agenda dan rapat publik','Komentar publik diterima']},
          {title:'Kepentingan Publik',icon:'👥',color:'bg-amber-50 border-amber-200',points:['Melindungi investor','Meningkatkan efisiensi pasar','Mendukung alokasi modal yang optimal']},
        ].map(m => (
          <div key={m.title} className={"p-5 rounded-xl border-2 " + m.color}>
            <div className="text-3xl mb-3">{m.icon}</div>
            <h3 className="text-xl mb-3 text-gray-800">{m.title}</h3>
            <ul className="space-y-2">
              {m.points.map(p => (
                <li key={p} className="flex items-start gap-2 text-sm text-gray-600">
                  <span className="text-green-500 flex-shrink-0">✅</span>{p}
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );

  case 5: return (
    <div className={"h-full p-12 bg-gradient-to-br " + SLATE}>
      <SlideHeader icon="📚" title="Apa itu Conceptual Framework?" subtitle="Kerangka Konseptual Pelaporan Keuangan"/>
      <div className="grid grid-cols-2 gap-8 mt-2">
        <div className="space-y-5">
          <div className="bg-white border border-blue-100 p-5 rounded-xl shadow-sm">
            <h3 className="text-lg text-[#1a3a8a] mb-2">Definisi</h3>
            <p className="text-gray-700 leading-relaxed text-sm">Conceptual Framework adalah <strong>sistem koheren dari tujuan dan konsep-konsep dasar</strong> yang saling berkaitan, yang mendasari pengembangan standar akuntansi yang konsisten dan yang menentukan sifat, fungsi, serta keterbatasan akuntansi keuangan dan laporan keuangan.</p>
          </div>
          <div className="bg-[#0f2557] text-white p-5 rounded-xl">
            <h3 className="text-lg text-amber-400 mb-3">Framework bukan standar, tapi:</h3>
            <ul className="space-y-2 text-sm">
              {['Panduan bagi FASB dalam menyusun standar baru','Referensi ketika tidak ada standar spesifik','Dasar untuk memahami dan menginterpretasi standar yang ada','Alat untuk menyelesaikan masalah akuntansi baru'].map((item,i) => (
                <li key={i} className="flex items-start gap-2"><span className="text-amber-400 flex-shrink-0">→</span>{item}</li>
              ))}
            </ul>
          </div>
        </div>
        <div className="space-y-4">
          <h3 className="text-lg text-gray-700">Analogi: Framework sebagai "Konstitusi"</h3>
          <div className="bg-white border border-gray-100 rounded-xl p-5 shadow-sm">
            <div className="grid grid-cols-2 gap-4 text-sm">
              {[
                {label:'Konstitusi Negara',value:'Conceptual Framework'},
                {label:'Undang-undang',value:'Standar FASB (ASC)'},
                {label:'Peraturan Pemerintah',value:'Interpretasi & Panduan'},
                {label:'Praktik Umum',value:'Kebijakan Akuntansi'},
              ].map(r => (
                <div key={r.label} className="text-center">
                  <div className="bg-gray-100 rounded-lg p-2 mb-1 text-gray-700">{r.label}</div>
                  <div className="text-xs text-gray-400">≈</div>
                  <div className="bg-blue-100 rounded-lg p-2 text-[#1a3a8a]">{r.value}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-amber-50 border border-amber-200 p-4 rounded-xl text-sm text-amber-800"><strong>Penting:</strong> Jika terjadi konflik antara Conceptual Framework dengan standar akuntansi spesifik, maka <strong>standar spesifik yang berlaku</strong>, bukan framework.</div>
        </div>
      </div>
    </div>
  );

  case 6: return (
    <div className="h-full p-12 bg-white">
      <SlideHeader icon="🎯" title="Tujuan Conceptual Framework" subtitle="Mengapa framework ini diperlukan?"/>
      <div className="grid grid-cols-2 gap-6 mt-2">
        <div className="space-y-4">
          {[
            {no:'1',title:'Panduan bagi FASB',desc:'Menyediakan arah yang jelas bagi FASB dalam mengembangkan standar akuntansi yang baru dan mengevaluasi standar yang sudah ada.',color:'border-blue-500 bg-blue-50'},
            {no:'2',title:'Konsistensi Standar',desc:'Memastikan standar-standar yang ditetapkan FASB saling konsisten satu sama lain dan didasarkan pada prinsip-prinsip yang sama.',color:'border-teal-500 bg-teal-50'},
            {no:'3',title:'Penyelesaian Masalah Baru',desc:'Memberikan dasar untuk menangani transaksi dan peristiwa baru yang belum diatur oleh standar yang ada.',color:'border-purple-500 bg-purple-50'},
          ].map(t => (
            <div key={t.no} className={"flex gap-4 p-4 rounded-xl border-l-4 " + t.color}>
              <span className="text-3xl text-gray-200 font-mono">{t.no}</span>
              <div><p className="text-gray-800 mb-1">{t.title}</p><p className="text-sm text-gray-600">{t.desc}</p></div>
            </div>
          ))}
        </div>
        <div className="space-y-4">
          {[
            {no:'4',title:'Pemahaman Penyusun Laporan',desc:'Membantu penyusun laporan keuangan memahami tujuan dan sifat laporan keuangan sehingga dapat membuat kebijakan akuntansi yang tepat.',color:'border-amber-500 bg-amber-50'},
            {no:'5',title:'Kepercayaan Publik',desc:'Meningkatkan kepercayaan publik terhadap proses penetapan standar akuntansi dengan menunjukkan bahwa standar didasarkan pada logika yang koheren.',color:'border-rose-500 bg-rose-50'},
            {no:'6',title:'Pendidikan Akuntansi',desc:'Memfasilitasi pemahaman yang lebih baik tentang standar GAAP bagi para mahasiswa, praktisi, dan pengguna laporan keuangan.',color:'border-green-500 bg-green-50'},
          ].map(t => (
            <div key={t.no} className={"flex gap-4 p-4 rounded-xl border-l-4 " + t.color}>
              <span className="text-3xl text-gray-200 font-mono">{t.no}</span>
              <div><p className="text-gray-800 mb-1">{t.title}</p><p className="text-sm text-gray-600">{t.desc}</p></div>

    <div className={"h-full p-12 bg-gradient-to-br " + SLATE}>
      <SlideHeader icon="🗂️" title="Struktur SFAC" subtitle="Statements of Financial Accounting Concepts"/>
      <div className="grid grid-cols-2 gap-4 mt-2">
        {[
          {no:'SFAC 1',year:'1978',title:'Tujuan Pelaporan Keuangan (Digantikan SFAC 8)',status:'Digantikan',color:'bg-gray-100 border-gray-300 opacity-60'},
          {no:'SFAC 2',year:'1980',title:'Karakteristik Kualitatif Informasi Akuntansi (Digantikan SFAC 8)',status:'Digantikan',color:'bg-gray-100 border-gray-300 opacity-60'},
          {no:'SFAC 3',year:'1980',title:'Elemen Laporan Keuangan Entitas Bisnis (Digantikan SFAC 6)',status:'Digantikan',color:'bg-gray-100 border-gray-300 opacity-60'},
          {no:'SFAC 4',year:'1980',title:'Tujuan Pelaporan oleh Entitas Non-Laba',status:'Berlaku',color:'bg-blue-50 border-blue-200'},
          {no:'SFAC 5',year:'1984',title:'Pengakuan dan Pengukuran dalam Laporan Keuangan Entitas Bisnis',status:'Berlaku',color:'bg-teal-50 border-teal-200'},
          {no:'SFAC 6',year:'1985',title:'Elemen Laporan Keuangan (Menggantikan SFAC 3)',status:'Berlaku',color:'bg-teal-50 border-teal-200'},
          {no:'SFAC 7',year:'2000',title:'Menggunakan Informasi Arus Kas dan Nilai Kini',status:'Berlaku',color:'bg-teal-50 border-teal-200'},

          </div>
        ))}
      </div>

  case 8: return (
    <div className="h-full p-12 bg-white">
      <SlideHeader icon="🗂️" title="Hierarki Conceptual Framework" subtitle="Tiga level konseptual FASB"/>
      <div className="flex flex-col items-center gap-3 mt-4">
        {[
          {level:'Level 1 — WHY',title:'Tujuan Pelaporan Keuangan',desc:'Memberikan informasi keuangan yang berguna untuk pengambilan keputusan',width:'w-2/5',color:'bg-[#0f2557] text-white'},
          {level:'Level 2 — WHAT',title:'Karakteristik Kualitatif & Elemen Laporan Keuangan',desc:'Apa jenis informasi yang harus ada dan bagaimana kualitasnya',width:'w-3/5',color:'bg-[#1a3a8a] text-white'},
          {level:'Level 3 — HOW',title:'Konsep Pengakuan, Pengukuran, & Penyajian',desc:'Bagaimana mengimplementasikan tujuan dan karakteristik dalam laporan keuangan',width:'w-4/5',color:'bg-[#1e40af] text-white'},
        ].map(l => (
